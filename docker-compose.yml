version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clinica_vet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - ./schema_corte3.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/01_procedures.sql:/docker-entrypoint-initdb.d/02_procedures.sql
      - ./backend/02_triggers.sql:/docker-entrypoint-initdb.d/03_triggers.sql
      - ./backend/03_views.sql:/docker-entrypoint-initdb.d/04_views.sql
      - ./backend/04_roles_y_permisos.sql:/docker-entrypoint-initdb.d/05_roles.sql
      - ./backend/05_rls.sql:/docker-entrypoint-initdb.d/06_rls.sql
      - pgdata:/var/lib/postgresql/data
    ports: 
      - "5432:5432"
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 5s

  redis:
    image: redis:7-alpine
    ports: 
      - "6379:6379"

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@postgres/clinica_vet
      REDIS_URL: redis://redis:6379
    ports: 
      - "8000:8000"
    depends_on:
      postgres: 
        condition: service_healthy
      redis: 
        condition: service_started

  frontend:
    build: ./frontend
    ports: 
      - "3000:3000"
    depends_on: 
      - api
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  pgdata:
